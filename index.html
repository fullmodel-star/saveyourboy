<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>男友救星 · 構圖教練</title>
<style>
  :root{ --accent:#ff5b8a; --good:#21d07a; --warn:#ff5b5b; --blue:#78b4ff; --gold:#ffd264;
    --ink:#fff; --bg:#0a0a0a; --chip:rgba(255,255,255,.12); }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif; overflow:hidden;}
  #stage{position:fixed; inset:0; background:#000;}
  video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  canvas{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}

  .top{position:absolute; top:0; left:0; right:0; padding:max(10px,env(safe-area-inset-top)) 12px 10px;
    display:flex; align-items:center; gap:8px; z-index:5;
    background:linear-gradient(#000a,#0000); pointer-events:none;}
  .top .brand{font-weight:800; font-size:15px; letter-spacing:.5px;}
  .top .brand small{font-weight:500; opacity:.7;}
  .spacer{flex:1;}
  .tbtn{pointer-events:auto; background:var(--chip); border:none; color:#fff;
    border-radius:999px; padding:8px 12px; font-size:13px; font-weight:600; backdrop-filter:blur(8px);}
  .tbtn.on{background:var(--accent);}
  .lvlnum{font-variant-numeric:tabular-nums;}

  .panel{position:absolute; left:0; right:0; bottom:0; z-index:6; display:flex; flex-direction:column; pointer-events:none;}
  .panel>*{pointer-events:auto;}

  .tip{margin:0 12px 8px; background:rgba(0,0,0,.6); backdrop-filter:blur(10px);
    border:1px solid #ffffff22; border-radius:14px; padding:8px 10px 10px;}
  .vnav{display:flex; align-items:center; gap:8px; margin-bottom:5px;}
  .vnav button{flex:0 0 auto; width:30px; height:30px; border-radius:50%; border:none;
    background:var(--chip); color:#fff; font-size:18px; line-height:1; font-weight:700;}
  .vnav button:active{background:var(--accent);}
  .vname{flex:1; font-weight:700; font-size:14px; text-align:center;}
  .vname .e{margin-right:4px;}
  .vcount{flex:0 0 auto; font-size:12px; opacity:.7; font-variant-numeric:tabular-nums;}
  .dots{display:flex; gap:4px; justify-content:center; margin-bottom:6px;}
  .dots i{width:6px; height:6px; border-radius:50%; background:#ffffff40;}
  .dots i.on{background:var(--accent); width:16px; border-radius:3px;}
  .tipbody{font-size:13px; line-height:1.5;}
  .tipbody b{color:var(--accent);}

  .row{display:flex; gap:7px; overflow-x:auto; padding:0 12px 8px; scrollbar-width:none;}
  .row::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; background:var(--chip); border:1px solid #ffffff14; color:#fff;
    border-radius:13px; padding:8px 12px; font-size:13px; font-weight:600; white-space:nowrap;
    display:flex; align-items:center; gap:5px;}
  .chip .e{font-size:16px;}
  .cats .chip.on{background:#ffffff26; border-color:#fff5;}
  .scenes .chip.on{background:var(--accent); border-color:transparent;}

  .bar{padding:10px 22px max(14px,env(safe-area-inset-bottom));
    display:flex; align-items:center; justify-content:space-between; background:linear-gradient(#0000,#000c);}
  .side{width:52px; height:52px; border-radius:50%; border:none; background:var(--chip); color:#fff; font-size:21px; backdrop-filter:blur(8px);}
  .shutter{width:72px; height:72px; border-radius:50%; border:5px solid #fff; background:#fff3; box-shadow:0 0 0 3px #0006; transition:transform .08s;}
  .shutter:active{transform:scale(.92);}

  .grids{position:absolute; right:12px; top:54px; z-index:7; display:none;
    background:rgba(20,20,20,.92); backdrop-filter:blur(10px); border:1px solid #ffffff1f;
    border-radius:14px; padding:6px; gap:4px; flex-direction:column; min-width:150px;}
  .grids.show{display:flex;}
  .grids button{background:none; border:none; color:#fff; text-align:left; padding:9px 12px; border-radius:9px; font-size:14px;}
  .grids button.on{background:var(--accent);}

  .gate{position:absolute; inset:0; z-index:20; background:#0c0c0c; display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px;}
  .gate.show{display:flex;}
  .gate h2{margin:0 0 6px; font-size:20px;}
  .gate p{opacity:.85; font-size:14px; line-height:1.7; max-width:360px;}
  .gate .big{font-size:44px; margin-bottom:10px;}
  .gate button{margin-top:18px; background:var(--accent); border:none; color:#fff; padding:13px 24px; border-radius:12px; font-size:16px; font-weight:700;}
  .flash{position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:30; transition:opacity .05s;}
</style>
</head>
<body>
<div id="stage">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div class="top">
  <div class="brand">男友救星 <small>· 構圖教練</small></div>
  <div class="spacer"></div>
  <button class="tbtn" id="lvlBtn">⊿ 水平 <span class="lvlnum" id="lvlTxt">--</span></button>
  <button class="tbtn" id="gridBtn">▦ 格線</button>
</div>

<div class="grids" id="gridMenu">
  <button data-g="thirds" class="on">▦ 三分法</button>
  <button data-g="center">＋ 中心十字</button>
  <button data-g="diag">✕ 對角線</button>
  <button data-g="off">○ 不顯示</button>
</div>

<div class="panel">
  <div class="tip">
    <div class="vnav">
      <button id="vPrev" aria-label="上一種構圖">‹</button>
      <div class="vname" id="vName"></div>
      <button id="vNext" aria-label="下一種構圖">›</button>
    </div>
    <div class="dots" id="vDots"></div>
    <div class="tipbody" id="tipBody"></div>
  </div>
  <div class="row scenes" id="scenes"></div>
  <div class="row cats" id="cats"></div>
  <div class="bar">
    <button class="side" id="flipBtn">🔄</button>
    <button class="shutter" id="shot" aria-label="拍照"></button>
    <button class="side" id="helpBtn">？</button>
  </div>
</div>

<div class="gate" id="gate">
  <div class="big">📷</div>
  <h2 id="gateTitle">需要相機權限</h2>
  <p id="gateMsg"></p>
  <button id="gateBtn">允許並開始</button>
</div>
<div class="flash" id="flash"></div>

/* ====================== 狀態 ====================== */
let cat='people';
let scene=SCENES[0];
let vi=0;                 // 目前變體索引
let grid='thirds';
let levelMode=null;       // 'tilt'|'flat'|null
let levelOn=false, facing='environment';
let roll=0, beta=0, gamma=0;

/* ====================== 分類列 ====================== */
const catsEl=$('#cats');
CATS.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='chip'+(i===0?' on':'');
  b.innerHTML=`<span class="e">${c.e}</span>${c.name}`;
  b.onclick=()=>{ cat=c.id;
    document.querySelectorAll('#cats .chip').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); buildScenes(); selectScene(SCENES.find(s=>s.cat===cat)); };
  catsEl.appendChild(b);
});

const scenesEl=$('#scenes');
function buildScenes(){
  scenesEl.innerHTML='';
  SCENES.filter(s=>s.cat===cat).forEach(s=>{
    const b=document.createElement('button');
    b.className='chip'; b.dataset.name=s.name;
    b.innerHTML=`<span class="e">${s.e}</span>${s.name}`;
    b.onclick=()=>selectScene(s);
    scenesEl.appendChild(b);
  });
}
function selectScene(s){
  scene=s; vi=0;
  document.querySelectorAll('#scenes .chip').forEach(x=>x.classList.toggle('on',x.dataset.name===s.name));
  renderVariant(); scenesEl.scrollLeft=0;
}
function renderVariant(){
  const v=scene.v[vi];
  grid = v.grid || 'thirds';
  levelMode = v.level || null;
  syncGridMenu();
  $('#vName').innerHTML=`<span class="e">${scene.e}</span>${v.n}`;
  $('#tipBody').innerHTML=`💡 ${v.t}`;
  // 圓點指示
  $('#vDots').innerHTML=scene.v.map((_,i)=>`<i class="${i===vi?'on':''}"></i>`).join('');
  if(levelMode) enableLevel(); else { $('#lvlTxt').textContent= levelOn? $('#lvlTxt').textContent : '--'; }
}
function changeVariant(d){ vi=(vi+d+scene.v.length)%scene.v.length; renderVariant(); }
$('#vPrev').onclick=()=>changeVariant(-1);
$('#vNext').onclick=()=>changeVariant(1);
buildScenes(); selectScene(SCENES[0]);

/* 左右滑動切換變體 */
let tsx=null;
document.addEventListener('touchstart',e=>{ if(e.target.closest('.row,.bar,.grids,.gate,.vnav')) {tsx=null; return;} tsx=e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend',e=>{ if(tsx==null) return; const dx=e.changedTouches[0].clientX-tsx;
  if(Math.abs(dx)>55) changeVariant(dx<0?1:-1); tsx=null; },{passive:true});

/* ====================== 格線選單 ====================== */
$('#gridBtn').onclick=()=>gridMenu.classList.toggle('show');
gridMenu.querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{ grid=b.dataset.g; syncGridMenu(); gridMenu.classList.remove('show'); };
});
function syncGridMenu(){ gridMenu.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.g===grid)); }

/* ====================== 水平儀 ====================== */
$('#lvlBtn').onclick=()=>{ levelOn?disableLevel():enableLevel(); };
function disableLevel(){ levelOn=false; $('#lvlBtn').classList.remove('on'); $('#lvlTxt').textContent='--'; }
async function enableLevel(){
  if(levelOn) return;
  try{ if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){
      const r=await DeviceOrientationEvent.requestPermission(); if(r!=='granted') return; } }catch(e){}
  window.addEventListener('deviceorientation', onOrient);
  levelOn=true; $('#lvlBtn').classList.add('on');
}
function onOrient(ev){
  beta=ev.beta||0; gamma=ev.gamma||0; roll=gamma;
  let dev = levelMode==='flat' ? Math.round(Math.max(Math.abs(beta),Math.abs(gamma))) : Math.round(gamma);
  $('#lvlTxt').textContent=(dev>0?'+':'')+dev+'°';
  $('#lvlTxt').style.color = Math.abs(dev)<=2 ? 'var(--good)' : (Math.abs(dev)<=6?'#ffd166':'var(--warn)');
}

/* ====================== 相機 ====================== */
let starting=false;
async function getStream(){
  try{ return await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing}, width:{ideal:1920}, height:{ideal:1080}}, audio:false}); }
  catch(e){ if(e && (e.name==='OverconstrainedError'||e.name==='NotFoundError'||e.name==='NotReadableError'))
      return await navigator.mediaDevices.getUserMedia({video:true, audio:false}); throw e; }
}
async function startCam(){
  if(starting) return; starting=true;
  try{
    if(location.protocol==='file:') throw {name:'FileProtocol'};
    if(!isSecureContext) throw {name:'Insecure'};
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw {name:'NoCamAPI'};
    stopCam();
    const stream=await getStream();
    video.srcObject=stream; video.setAttribute('playsinline',''); video.muted=true;
    await video.play();
    $('#gate').classList.remove('show'); resize();
  }catch(err){ showGate(err); } finally{ starting=false; }
}
function stopCam(){ if(video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject=null; } }
$('#flipBtn').onclick=async()=>{ facing=facing==='environment'?'user':'environment'; await startCam(); };

function showStart(){
  const g=$('#gate'); g.classList.add('show');
  $('#gateTitle').textContent='男友救星 · 構圖教練';
  $('#gateMsg').innerHTML='點下面開啟相機。<br>首次會詢問<b>相機權限</b>，請按「允許」。';
  $('#gateBtn').textContent='📷 開啟相機';
}
function showGate(err){
  const g=$('#gate'); g.classList.add('show'); $('#gateBtn').textContent='重試';
  if(err && err.name==='Insecure'){ $('#gateTitle').textContent='需要安全連線（HTTPS）';
    $('#gateMsg').innerHTML='相機只能在 <b>https://</b> 網址下使用。請確認網址開頭是 https。';
  }else if(err && err.name==='NoCamAPI'){ $('#gateTitle').textContent='這個畫面不能用相機';
    $('#gateMsg').innerHTML='你在<b>內嵌預覽或非安全環境</b>開啟。請用<b>手機瀏覽器</b>打開 HTTPS 網址。';
  }else if(err && err.name==='FileProtocol'){ $('#gateTitle').textContent='需要用網址開啟';
    $('#gateMsg').innerHTML='直接點開檔案（file://）不能用相機。請放到 <b>HTTPS 網址</b>開啟。';
  }else if(err && (err.name==='NotAllowedError'||err.name==='SecurityError')){ $('#gateTitle').textContent='相機權限被拒絕';
    $('#gateMsg').innerHTML='請到網址列旁🔒把<b>相機改成允許</b>再重試。<br>（iPhone：設定→Safari→相機→允許）';
  }else if(err && err.name==='NotReadableError'){ $('#gateTitle').textContent='相機被佔用了';
    $('#gateMsg').innerHTML='相機正被其他 App/分頁使用。請<b>關掉它們</b>再重試。';
  }else{ $('#gateTitle').textContent='開不了相機';
    $('#gateMsg').innerHTML='錯誤："'+(err&&err.name||err)+'"<br><br>請改用<b>系統內建瀏覽器</b>（iPhone Safari、Android Chrome），別在 LINE/IG/FB 內建瀏覽器開。'; }
}
$('#gateBtn').onclick=startCam;

/* ====================== 畫布 ====================== */
function resize(){ const r=cv.getBoundingClientRect();
  cv.width=r.width*devicePixelRatio; cv.height=r.height*devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
addEventListener('resize',resize);

/* ====================== 繪圖 helper ====================== */
function line(a,b,c,d){ctx.beginPath();ctx.moveTo(a,b);ctx.lineTo(c,d);ctx.stroke();}
function dot(x,y,col){ctx.fillStyle=col||'rgba(255,91,138,.9)';ctx.beginPath();ctx.arc(x,y,4,0,7);ctx.fill();}
function tag(t,x,y){ctx.font='600 12px sans-serif';ctx.textBaseline='top';
  x=Math.max(2,Math.min(x, cv.width/devicePixelRatio - ctx.measureText(t).width-12)); y=Math.max(2,y);
  const w=ctx.measureText(t).width+10; ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(x,y,w,18);
  ctx.fillStyle='#fff'; ctx.fillText(t,x+5,y+3);}

function draw(){
  const W=cv.width/devicePixelRatio, H=cv.height/devicePixelRatio;
  ctx.clearRect(0,0,W,H); ctx.lineWidth=1;
  // 底層格線
  ctx.strokeStyle='rgba(255,255,255,.4)';
  if(grid==='thirds'){ for(let i=1;i<3;i++){line(W*i/3,0,W*i/3,H);line(0,H*i/3,W,H*i/3);}
    [[1,1],[2,1],[1,2],[2,2]].forEach(p=>dot(W*p[0]/3,H*p[1]/3));
  }else if(grid==='center'){ line(W/2,0,W/2,H); line(0,H/2,W,H/2);
  }else if(grid==='diag'){ line(0,0,W,H); line(W,0,0,H); }
  // 變體
  drawVariant(scene.v[vi],W,H);
  if(levelOn && levelMode) drawLevel(W,H);
  requestAnimationFrame(draw);
}

function drawVariant(v,W,H){
  if(v.hz) drawHz(v.hz,W,H);
  if(v.sym) drawSym(v.sym,W,H);
  if(v.fbox) drawFbox(W,H);
  if(v.lead) drawLead(v.lead,W,H);
  if(v.zone) drawZone(v.zone,W,H);
  if(v.fig) drawFig(v.fig[0]*W, v.fig[1]*H, v.fig[2]*H);
  if(v.eye!=null) drawEye((typeof v.eye==='number'?v.eye:0.333)*H,W);
  if(v.sun) drawSun(v.sun[0]*W, v.sun[1]*H);
}

function drawFig(cx,by,h){
  // 乾淨的人形剪影：頭 + 圓肩身體輪廓（標示「站這裡、佔多高」）
  const headR=h*0.072, topY=by-h, headCY=topY+headR;
  const shoulderY=headCY+headR*1.7, bodyW=h*0.19, r2=bodyW/2, bx=cx-r2;
  ctx.save(); ctx.lineJoin='round';
  ctx.strokeStyle='rgba(255,91,138,.9)'; ctx.fillStyle='rgba(255,91,138,.15)';
  ctx.lineWidth=Math.max(2,h*0.012);
  ctx.beginPath();                                  // 身體（圓肩柱狀）
  ctx.moveTo(bx,by); ctx.lineTo(bx,shoulderY+r2);
  ctx.arc(cx,shoulderY+r2,r2,Math.PI,0);
  ctx.lineTo(bx+bodyW,by); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,headCY,headR,0,7); ctx.fill(); ctx.stroke();  // 頭
  ctx.restore();
  tag('人放這', cx-22, Math.max(2,topY-20));
}
function drawZone(z,W,H){
  const x=z[0]*W,y=z[1]*H,w=z[2]*W,h=z[3]*H;
  ctx.save(); ctx.setLineDash([8,6]); ctx.lineWidth=2; ctx.strokeStyle='rgba(255,91,138,.95)';
  ctx.fillStyle='rgba(255,91,138,.1)';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,10);ctx.fill();ctx.stroke();}
  else{ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);}
  ctx.restore(); if(z[4]) tag(z[4], x+4, y+4);
}
function drawEye(y,W){ ctx.save(); ctx.setLineDash([4,5]); ctx.lineWidth=1.5; ctx.strokeStyle='rgba(255,255,255,.85)';
  line(0,y,W,y); ctx.restore(); tag('眼睛放這', 8, y-20); }
function drawHz(pos,W,H){ const y= pos==='low'?H*2/3 : pos==='high'?H/3 : H/2;
  ctx.save(); ctx.setLineDash([10,8]); ctx.lineWidth=2; ctx.strokeStyle='rgba(33,208,122,.9)';
  line(0,y,W,y); ctx.restore();
  tag(pos==='low'?'地平線（天空多）':pos==='high'?'地平線（地景多）':'地平線', 8, y-20); }
function drawSym(dir,W,H){ ctx.save(); ctx.setLineDash([6,7]); ctx.lineWidth=1.5; ctx.strokeStyle='rgba(120,180,255,.8)';
  if(dir==='v'){ line(W/2,0,W/2,H); ctx.restore(); tag('左右對稱中線',W/2+6,8); }
  else{ line(0,H/2,W,H/2); ctx.restore(); tag('上下對稱中線',8,H/2+4); } }
function drawVertHint(){}
function drawSun(x,y){ ctx.save(); ctx.strokeStyle='rgba(255,210,100,.95)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x,y,13,0,7); ctx.stroke();
  for(let a=0;a<8;a++){const g=a*Math.PI/4; line(x+Math.cos(g)*17,y+Math.sin(g)*17,x+Math.cos(g)*22,y+Math.sin(g)*22);}
  ctx.restore(); tag('太陽放這', x+24, y-9); }
function drawFbox(W,H){ ctx.save(); ctx.setLineDash([10,8]); ctx.lineWidth=2; ctx.strokeStyle='rgba(255,210,100,.9)';
  const m=Math.min(W,H)*0.13; ctx.strokeRect(m,m,W-2*m,H-2*m); ctx.restore();
  tag('用門窗/樹枝填滿外圈，主體放中央', m+4, m+4); }
function drawLead(p,W,H){ const x1=p[0]*W,y1=p[1]*H,x2=p[2]*W,y2=p[3]*H;
  ctx.save(); ctx.strokeStyle='rgba(120,180,255,.9)'; ctx.lineWidth=2.5; ctx.setLineDash([2,0]);
  line(x1,y1,x2,y2);
  const ang=Math.atan2(y2-y1,x2-x1);                 // 箭頭
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-14*Math.cos(ang-0.4), y2-14*Math.sin(ang-0.4));
  ctx.moveTo(x2,y2); ctx.lineTo(x2-14*Math.cos(ang+0.4), y2-14*Math.sin(ang+0.4)); ctx.stroke();
  ctx.restore(); tag('引導線帶向主體', x1+4, y1-20); }

function drawLevel(W,H){
  const cx=W/2, cy=H/2;
  if(levelMode==='flat'){
    const R=44, px=cx+Math.max(-1,Math.min(1,gamma/20))*R, py=cy+Math.max(-1,Math.min(1,beta/20))*R;
    const ok=Math.abs(beta)<=3&&Math.abs(gamma)<=3;
    ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke(); ctx.beginPath();ctx.arc(cx,cy,8,0,7);ctx.stroke();
    ctx.fillStyle=ok?'rgba(33,208,122,.95)':'rgba(255,91,138,.95)'; ctx.beginPath();ctx.arc(px,py,11,0,7);ctx.fill();
  }else{
    const ok=Math.abs(roll)<=2;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(roll*Math.PI/180);
    ctx.strokeStyle=ok?'rgba(33,208,122,.95)':'rgba(255,91,138,.95)'; ctx.lineWidth=2.5;
    line(-70,0,-18,0); line(18,0,70,0); ctx.fillStyle=ctx.strokeStyle; ctx.beginPath();ctx.arc(0,0,3,0,7);ctx.fill(); ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1; line(cx-12,cy,cx+12,cy);
  }
}

/* ====================== 拍照（乾淨原圖） ====================== */
$('#shot').onclick=()=>{
  if(!video.videoWidth) return;
  const c=document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight;
  const x=c.getContext('2d');
  if(facing==='user'){ x.translate(c.width,0); x.scale(-1,1); }
  x.drawImage(video,0,0,c.width,c.height);
  const f=$('#flash'); f.style.opacity=.85; setTimeout(()=>f.style.opacity=0,60);
  c.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download='photo_'+Date.now()+'.jpg'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  },'image/jpeg',0.95);
};

$('#helpBtn').onclick=()=>{ alert('男友救星 · 構圖教練\n\n1. 下排先選大類，再選題材\n2. 每個題材有多種「構圖卡」，用提示列的 ‹ › 或左右滑動切換\n3. 畫面會疊上「人放這」的位置標記＋引導線\n4. 右上「水平」保持 ±2°（綠色）不拍歪\n5. 中央大鈕拍乾淨原圖\n\n核心：人放三分線、腳要進框、相機放低、別拍歪。'); };

/* ====================== 啟動 ====================== */
syncGridMenu(); resize(); draw(); showStart();
document.addEventListener('click',()=>{ if(!levelOn && levelMode) enableLevel(); },{once:true});
</script>
</body>
